site_name: Mentoria Tecnologia Takwara
site_url: https://takwaratec.github.io/Mentoria_Tecnologia_Takwara/
site_author: Takwara Tech
site_description: Futurismo Ancestral — Arquitetura Vernacular de Alta Tecnologia. Estudo de implantação de mentoria em bambu e poliuretano vegetal.

theme:
  name: material
  logo: assets/images/takwara_logo.png
  favicon: assets/images/takwara_logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: black
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
  custom_dir: overrides

copyright: '&copy; 2026 Tecnologia Takwara. Todos os direitos reservados.'
extra:
  generator: false

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10.4.0/dist/mermaid.min.js

plugins:
  - search

nav:
  - Início: index.md
  - Base de Conhecimento:
    - Ecologia e Universo do Bambu: 02_BASE_DE_CONHECIMENTO/TEC_01_Ecologia_e_Universo_do_Bambu.md
    - Tratamentos e a Magia do Boro: 02_BASE_DE_CONHECIMENTO/TEC_02_Tratamentos_e_A_Magia_do_Boro.md
    - O Poliuretano Vegetal e a Bio-Solda: 02_BASE_DE_CONHECIMENTO/TEC_03_O_Poliuretano_Vegetal_e_Aplicacao.md
    - Dossiê Comparativo Biopolímeros: 02_BASE_DE_CONHECIMENTO/TEC_03_Dossie_Comparativo_Biopolimeros.md
    - Engenharia e Escala Industrial: 02_BASE_DE_CONHECIMENTO/TEC_04_Engenharia_e_Escala_Industrial.md
    - Dossiê Tratamentos Bambu: 02_BASE_DE_CONHECIMENTO/TEC_04_Dossie_Tratamentos_Bambu.md
    - Bibliografia e Referências: 02_BASE_DE_CONHECIMENTO/TEC_05_Bibliografia_e_Referencias.md
    - Histórico de Autoridade: 02_BASE_DE_CONHECIMENTO/TEC_06_Historico_Autoridade.md
  - PU Vegetal:
    - Linha de Produtos (Catálogo): PU_Vegetal_Linha_de_Produtos.md
    - Ficha Técnica Consolidada: PU_Vegetal_Ficha_Tecnica_Consolidada.md
  - Jornada 7 Passos:
    - Passo 1 - Diagnóstico Persona: 03_JORNADA_7_PASSOS/PASSO_01_Diagnostico_Persona.md
    - Passo 2 - Jornada do Mentorado: 03_JORNADA_7_PASSOS/PASSO_02_Jornada_do_Mentorado.md
    - Passo 3 - Estrutura e Formato: 03_JORNADA_7_PASSOS/PASSO_03_Estrutura_Formato.md
    - Passo 4 - Entrega e Acompanhamento: 03_JORNADA_7_PASSOS/PASSO_04_Entrega_Acompanhamento.md
    - Passo 5 - Precificação: 03_JORNADA_7_PASSOS/PASSO_05_Precificacao.md
    - Passo 6 - Oferta e Naming: 03_JORNADA_7_PASSOS/PASSO_06_Oferta_Naming.md
    - Passo 7 - Imersão de Vendas: 03_JORNADA_7_PASSOS/PASSO_07_Imersao_Vendas.md
  - Metodologia:
    - Ecossistema de Ferramentas: 00_METODOLOGIA/ecossistema-ferramentas.html
    - Manual de Parceria: 00_METODOLOGIA/manual-parceria.html
    - DIA 06 — Finalização da Oferta: 00_METODOLOGIA/DIA_06_Finalizacao_Oferta.md
